<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LibHGP 几何算法可视化</title>
  <style>
    body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
    #sidebar {
      width: 280px; padding: 16px; background: #1a1a2e;
      color: #eee; overflow-y: auto; z-index: 10;
    }
    #canvas-container { flex: 1; position: relative; }
    canvas { display: block; }
    .section { margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 14px; }
    h3 { color: #a78bfa; margin: 0 0 10px; font-size: 14px; }
    button {
      width: 100%; padding: 8px; margin-top: 6px;
      background: #7c3aed; color: white; border: none;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #6d28d9; }
    input[type=range] { width: 100%; margin-top: 4px; }
    label { font-size: 12px; color: #aaa; }
    #status {
      position: absolute; bottom: 10px; left: 10px;
      color: white; background: rgba(0,0,0,0.5);
      padding: 6px 12px; border-radius: 4px; font-size: 12px;
    }
  </style>
</head>
<body>

<!-- 侧边栏：算法控制面板 -->
<div id="sidebar">
  <h2 style="color:#a78bfa; margin-top:0">LibHGP 算法库</h2>

  <!-- 算法 1：3D 凸包 -->
  <div class="section">
    <h3>🔷 3D 凸包</h3>
    <label>随机点数量：<span id="pt-count-label">30</span></label>
    <input type="range" id="pt-count" min="10" max="200" value="30"
      oninput="document.getElementById('pt-count-label').textContent=this.value">
    <button onclick="runConvexHull3D()">计算并渲染凸包</button>
  </div>

  <!-- 算法 2：拉普拉斯平滑 -->
  <div class="section">
    <h3>🌊 拉普拉斯平滑</h3>
    <label>迭代次数：<span id="smooth-iter-label">5</span></label>
    <input type="range" id="smooth-iter" min="1" max="50" value="5"
      oninput="document.getElementById('smooth-iter-label').textContent=this.value">
    <button onclick="runSmooth()">平滑当前网格</button>
  </div>

  <!-- 算法 3：网格曲率（热力图） -->
  <div class="section">
    <h3>🌡️ 曲率热力图</h3>
    <button onclick="runCurvature()">计算曲率着色</button>
  </div>

  <!-- 算法 4：测地线路径 -->
  <div class="section">
    <h3>📏 最短测地路径</h3>
    <label>点击网格选择起点/终点</label>
    <button onclick="startGeodesicPick()">选择起/终点</button>
    <button onclick="runGeodesic()">计算测地路径</button>
  </div>

  <!-- 算法 5：网格切片 -->
  <div class="section">
    <h3>✂️ 网格切片</h3>
    <label>切片数量：<span id="slice-count-label">5</span></label>
    <input type="range" id="slice-count" min="1" max="20" value="5"
      oninput="document.getElementById('slice-count-label').textContent=this.value">
    <button onclick="runSlicer()">沿Z轴切片</button>
  </div>

  <!-- 算法 6：2D 凸包 -->
  <div class="section">
    <h3>⬟ 2D 凸包</h3>
    <label>在下方 XY 平面点击添加点</label>
    <button onclick="enable2DMode()">进入 2D 模式</button>
    <button onclick="run2DConvexHull()">计算 2D 凸包</button>
    <button onclick="clear2D()">清空</button>
  </div>
</div>

<!-- Three.js 画布 -->
<div id="canvas-container">
  <div id="status">就绪</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── 全局 API 地址 ──
const API = 'http://localhost:8000/api';

// ════════════════════════════════════════════════
// Three.js 场景初始化
// ════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

const camera = new THREE.PerspectiveCamera(
  45, container.clientWidth / container.clientHeight, 0.01, 1000
);
camera.position.set(0, 0, 5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// 坐标轴辅助
scene.add(new THREE.AxesHelper(2));

// 窗口 resize
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// 渲染循环
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ════════════════════════════════════════════════
// 工具函数
// ════════════════════════════════════════════════

const status = (msg) => document.getElementById('status').textContent = msg;

// 清除场景中的几何对象（保留灯光/坐标轴）
function clearScene() {
  scene.children
    .filter(o => o.isMesh || o.isLine || o.isPoints || o.isLineSegments)
    .forEach(o => { scene.remove(o); o.geometry.dispose(); });
}

// 从 API 返回的 {vertices:[...], faces:[...]} 构建 BufferGeometry
function buildGeometry(data) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',
    new THREE.Float32BufferAttribute(data.vertices, 3));
  if (data.faces && data.faces.length > 0)
    geo.setIndex(data.faces);
  geo.computeVertexNormals();
  return geo;
}

// 用热力图颜色（蓝→红）对顶点着色
function applyHeatmapColors(geo, values) {
  const min = Math.min(...values), max = Math.max(...values);
  const colors = [];
  for (const v of values) {
    const t = (v - min) / (max - min + 1e-9);
    // 蓝(0,0,1) → 绿(0,1,0) → 红(1,0,0)
    const r = Math.min(1, t * 2);
    const g = t < 0.5 ? t * 2 : (1 - t) * 2;
    const b = Math.max(0, 1 - t * 2);
    colors.push(r, g, b);
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
}

// ════════════════════════════════════════════════
// 全局状态
// ════════════════════════════════════════════════
let currentMesh = null;          // 当前加载的网格对象（Three.js Mesh）
let currentMeshData = null;      // 当前网格的原始数据 {vertices, face_id_0/1/2}
let geodesicSource = null;       // 测地线起点
let geodesicTarget = null;       // 测地线终点
let points2D = [];               // 2D 模式的点集
let mode2D = false;

// ════════════════════════════════════════════════
// 算法 1：3D 凸包
// ════════════════════════════════════════════════
window.runConvexHull3D = async () => {
  const n = parseInt(document.getElementById('pt-count').value);
  // 生成随机点云（单位球内）
  const points = Array.from({ length: n }, () => [
    (Math.random() - 0.5) * 4,
    (Math.random() - 0.5) * 4,
    (Math.random() - 0.5) * 4,
  ]);

  status('计算凸包中...');
  try {
    const res = await fetch(`${API}/convex_hull_3d`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ points }),
    });
    const data = await res.json();
    clearScene();

    // 渲染凸包网格（半透明）
    const geo = buildGeometry(data);
    const mat = new THREE.MeshPhongMaterial({
      color: 0x7c3aed, transparent: true, opacity: 0.6,
      side: THREE.DoubleSide, wireframe: false,
    });
    currentMesh = new THREE.Mesh(geo, mat);
    scene.add(currentMesh);

    // 叠加线框
    const wf = new THREE.LineSegments(
      new THREE.WireframeGeometry(geo),
      new THREE.LineBasicMaterial({ color: 0xa78bfa, opacity: 0.4, transparent: true })
    );
    scene.add(wf);

    // 保存原始数据（供平滑等接口继续使用）
    currentMeshData = {
      vertices:  data.vertices,   // 已展平
      face_id_0: data.faces.filter((_, i) => i % 3 === 0),
      face_id_1: data.faces.filter((_, i) => i % 3 === 1),
      face_id_2: data.faces.filter((_, i) => i % 3 === 2),
    };
    // 还原为嵌套数组给后续接口用
    currentMeshData.vertices_nested = [];
    for (let i = 0; i < data.vertices.length; i += 3)
      currentMeshData.vertices_nested.push([
        data.vertices[i], data.vertices[i+1], data.vertices[i+2]
      ]);

    status(`凸包：${data.vertices.length / 3} 顶点，${data.faces.length / 3} 面片`);
  } catch (e) {
    status('错误：' + e.message);
  }
};

// ════════════════════════════════════════════════
// 算法 2：拉普拉斯平滑
// ════════════════════════════════════════════════
window.runSmooth = async () => {
  if (!currentMeshData) { status('请先加载一个网格'); return; }
  const iter = parseInt(document.getElementById('smooth-iter').value);
  status(`平滑中（${iter}次迭代）...`);
  try {
    const res = await fetch(`${API}/smooth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        vertices:  currentMeshData.vertices_nested,
        face_id_0: currentMeshData.face_id_0,
        face_id_1: currentMeshData.face_id_1,
        face_id_2: currentMeshData.face_id_2,
        iterations: iter,
      }),
    });
    const data = await res.json();
    clearScene();

    const geo = buildGeometry(data);
    const mat = new THREE.MeshPhongMaterial({
      color: 0x10b981, side: THREE.DoubleSide
    });
    currentMesh = new THREE.Mesh(geo, mat);
    scene.add(currentMesh);
    scene.add(new THREE.LineSegments(
      new THREE.WireframeGeometry(geo),
      new THREE.LineBasicMaterial({ color: 0x6ee7b7, transparent: true, opacity: 0.3 })
    ));

    // 更新 currentMeshData
    currentMeshData.vertices = data.vertices;
    currentMeshData.vertices_nested = [];
    for (let i = 0; i < data.vertices.length; i += 3)
      currentMeshData.vertices_nested.push([
        data.vertices[i], data.vertices[i+1], data.vertices[i+2]
      ]);

    status(`平滑完成：${iter} 次迭代`);
  } catch (e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 3：曲率热力图
// ════════════════════════════════════════════════
window.runCurvature = async () => {
  if (!currentMeshData) { status('请先加载一个网格'); return; }
  status('计算曲率中...');
  try {
    const res = await fetch(`${API}/curvature`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mesh_path:    '/tmp/current_mesh.obj',   // 服务端保存路径
        input_points: currentMeshData.vertices_nested,
      }),
    });
    const data = await res.json();

    if (currentMesh) {
      // 用 max_curvatures 对顶点着色
      const geo = currentMesh.geometry;
      applyHeatmapColors(geo, data.max_curvatures);
      currentMesh.material = new THREE.MeshPhongMaterial({
        vertexColors: true, side: THREE.DoubleSide
      });
    }
    status('曲率热力图渲染完成');
  } catch (e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 4：测地线路径（射线拾取起/终点）
// ════════════════════════════════════════════════
let pickStep = 0;  // 0=空闲, 1=选起点, 2=选终点

window.startGeodesicPick = () => {
  pickStep = 1;
  geodesicSource = null;
  geodesicTarget = null;
  status('请点击网格选择【起点】');
};

const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  if (pickStep === 0 || !currentMesh) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width)  *  2 - 1;
  mouse.y = ((e.clientY - rect.top)  / rect.height) * -2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(currentMesh);
  if (!hits.length) return;

  const pt = hits[0].point;
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.05),
    new THREE.MeshBasicMaterial({ color: pickStep === 1 ? 0x00ff00 : 0xff0000 })
  );
  sphere.position.copy(pt);
  scene.add(sphere);

  if (pickStep === 1) {
    geodesicSource = [pt.x, pt.y, pt.z];
    pickStep = 2;
    status('请点击网格选择【终点】');
  } else {
    geodesicTarget = [pt.x, pt.y, pt.z];
    pickStep = 0;
    status('起/终点已选定，点击「计算测地路径」');
  }
});

window.runGeodesic = async () => {
  if (!geodesicSource || !geodesicTarget) { status('请先选择起/终点'); return; }
  status('计算测地路径中...');
  try {
    const res = await fetch(`${API}/geodesic_path`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mesh_path: '/tmp/current_mesh.obj',
        source:    geodesicSource,
        target:    geodesicTarget,
      }),
    });
    const data = await res.json();

    // 渲染路径为黄色折线
    const pts = data.path.map(p => new THREE.Vector3(p[0], p[1], p[2]));
    const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(
      lineGeo,
      new THREE.LineBasicMaterial({ color: 0xfbbf24, linewidth: 3 })
    );
    scene.add(line);
    status(`测地路径：${pts.length} 个节点`);
  } catch (e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 5：网格切片
// ════════════════════════════════════════════════
window.runSlicer = async () => {
  const n = parseInt(document.getElementById('slice-count').value);
  if (!currentMeshData) { status('请先加载一个网格'); return; }

  // 计算 Y 范围，均匀切片
  const ys = currentMeshData.vertices_nested.map(v => v[1]);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const ds = Array.from({ length: n }, (_, i) =>
    -(yMin + (yMax - yMin) * (i + 1) / (n + 1))  // d = -plane_n·p 当 n=(0,1,0)
  );

  status('切片中...');
  try {
    const res = await fetch(`${API}/slicer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mesh_path:    '/tmp/current_mesh.obj',
        plane_normal: [0, 1, 0],
        plane_ds:     ds,
      }),
    });
    const data = await res.json();

    // 每条切面轮廓渲染为一条 LineLoop
    const colors = [0xf87171, 0xfbbf24, 0x34d399, 0x60a5fa, 0xc084fc];
    data.slices.forEach((s, idx) => {
      const pts = s.contour.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      if (!pts.length) return;
      pts.push(pts[0]); // 闭合
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const line = new THREE.Line(
        geo,
        new THREE.LineBasicMaterial({ color: colors[idx % colors.length] })
      );
      scene.add(line);
    });
    status(`切片完成：${data.slices.length} 个截面`);
  } catch (e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 6：2D 凸包（XY 平面交互）
// ════════════════════════════════════════════════
window.enable2DMode = () => {
  mode2D = true;
  camera.position.set(0, 0, 8);
  camera.lookAt(0, 0, 0);
  status('2D 模式：在场景中点击添加点');
};

window.clear2D = () => {
  points2D = [];
  clearScene();
  status('2D 点集已清空');
};

renderer.domElement.addEventListener('click', (e) => {
  if (!mode2D) return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width)  *  2 - 1;
  mouse.y = ((e.clientY - rect.top)  / rect.height) * -2 + 1;

  // 将屏幕坐标反投影到 Z=0 平面
  const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
  const dir = vec.sub(camera.position).normalize();
  const t = -camera.position.z / dir.z;
  const pos = camera.position.clone().add(dir.multiplyScalar(t));

  points2D.push([pos.x, pos.y]);

  // 渲染点
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.05),
    new THREE.MeshBasicMaterial({ color: 0xfbbf24 })
  );
  dot.position.set(pos.x, pos.y, 0);
  scene.add(dot);
});

window.run2DConvexHull = async () => {
  if (points2D.length < 3) { status('至少需要 3 个点'); return; }
  try {
    const res = await fetch(`${API}/convex_hull_2d`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ polygon: points2D }),
    });
    const data = await res.json();

    // 渲染凸包轮廓
    const hull = data.hull;
    hull.push(hull[0]); // 闭合
    const pts = hull.map(p => new THREE.Vector3(p[0], p[1], 0));
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(
      geo,
      new THREE.LineBasicMaterial({ color: 0xa78bfa, linewidth: 2 })
    );
    scene.add(line);
    status(`2D 凸包：${data.hull.length} 个顶点`);
  } catch (e) { status('错误：' + e.message); }
};
</script>
</body>
</html>
